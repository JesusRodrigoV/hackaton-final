services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-gateway
    networks:
      - hackaton-net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      CREDIT_SERVICE_URL: http://app:8000
      SCORING_RAW_SERVICE_URL: http://ms-scoring:5000
      OPERATIONS_SERVICE_URL: http://ms-operaciones:8003
      PROXY_TIMEOUT_MS: 12000
      SCORING_SIMULATE_DELAY: 1
    depends_on:
      - ms-scoring
      - ms-operaciones
    networks:
      - hackaton-net

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:62625054@app-db:5432/KATAFINAL
      SCORING_SERVICE_URL: http://api-gateway:8001
      OPERATIONS_SERVICE_URL: http://api-gateway:8001
      SECRET_KEY_PROD: super-secret-key-para-firmas-de-auditoria-2026
      ENVIRONMENT: development
    depends_on:
      app-db:
        condition: service_healthy
    networks:
      - hackaton-net

  app-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "62625054"
      POSTGRES_DB: KATAFINAL
    ports:
      - "5432:5432"
    volumes:
      - app_core_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d KATAFINAL"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hackaton-net

  ms-scoring:
    build:
      context: ./ms-scoring
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
    networks:
      - hackaton-net

  ms-operaciones:
    build:
      context: ./ms-operaciones
      dockerfile: Dockerfile
    ports:
      - "8002:8003"
    env_file:
      - ./ms-operaciones/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hackaton-net

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: neolend
      POSTGRES_PASSWORD: neolend123
      POSTGRES_DB: ms_operaciones
    ports:
      - "5435:5432"
    volumes:
      - ms_operaciones_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neolend -d ms_operaciones"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hackaton-net

networks:
  hackaton-net:
    driver: bridge

volumes:
  app_core_data:
  ms_operaciones_data:
